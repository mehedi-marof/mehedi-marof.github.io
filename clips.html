        const clipsGrid = document.getElementById("clipsGrid");

        function formatDate(dateString) {
            const date = new Date(dateString + "T00:00:00");
            return date.toLocaleDateString("en-US", {
                year: "numeric",
                month: "long",
                day: "numeric"
            });
        }

        function renderClips() {
            const sorted = [...clips].sort((a, b) => new Date(b.date) - new Date(a.date));

            clipsGrid.innerHTML = sorted.map((clip) => {
                const tags = clip.categories
                    .map((category) => `<span class="clip-tag">${category}</span>`)
                    .join("");

                const logoSrc = outletLogos[clip.outlet];
                const logoMarkup = logoSrc
                    ? `<img src="${logoSrc}" alt="${clip.outlet} logo" class="published-logo">`
                    : `<span class="published-outlet-name">${clip.outlet}</span>`;

                return `
                    <article class="published-card">
                        <a class="published-card-link" href="${clip.url}" target="_blank" rel="noopener noreferrer" aria-label="${clip.title}">
                            <div class="published-meta-top">
                                <div class="published-logo-wrap">
                                    ${logoMarkup}
                                </div>
                                <p class="published-date">${formatDate(clip.date)}</p>
                            </div>

                            <h2 class="published-headline">${clip.title}</h2>

                            <div class="published-tags">
                                ${tags}
                            </div>
                        </a>
                    </article>
                `;
            }).join("");
        }
